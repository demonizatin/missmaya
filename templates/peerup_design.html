<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>PeerUp — Practice English with Miss Maya</title>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght,SOFT,WONK@0,9..144,300..700,0..100,0..1;1,9..144,300..700,0..100,0..1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #2A201A; }
  body {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; padding: 24px; box-sizing: border-box;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      radial-gradient(ellipse at 20% 20%, #EFE7FB 0%, transparent 55%),
      radial-gradient(ellipse at 80% 80%, #DCCEF5 0%, transparent 55%),
      #F5F1FB;
  }
  * { -webkit-tap-highlight-color: transparent; }
  button { -webkit-tap-highlight-color: transparent; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="/static/peerup/ios-frame.jsx"></script>
<script type="text/babel" src="/static/peerup/tweaks-panel.jsx"></script>
<script type="text/babel" src="/static/peerup/maya-avatar.jsx"></script>
<script type="text/babel" src="/static/peerup/screens.jsx"></script>

<script type="text/babel" data-presets="react">
const S = window.PeerUpScreens;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "dark": false,
  "captions": true,
  "ambient": "Off",
  "voice": "Indian English",
  "startScreen": "splash"
}/*EDITMODE-END*/;

function App() {
  const { values, setTweak } = useTweaks(TWEAK_DEFAULTS);
  const [screen, setScreen] = React.useState(values.startScreen);
  const [langs, setLangs] = React.useState(['हिंदी']);

  // Auto-advance splash
  React.useEffect(() => {
    if (screen === 'splash') {
      const t = setTimeout(() => setScreen('welcome'), 1200);
      return () => clearTimeout(t);
    }
  }, [screen]);

  // Tweaks startScreen sync
  React.useEffect(() => { setScreen(values.startScreen); }, [values.startScreen]);

  const settings = {
    voice: values.voice, captions: values.captions,
    ambient: values.ambient, dark: values.dark, langs,
  };
  const onChange = (patch) => {
    if (patch.langs !== undefined) setLangs(patch.langs);
    const persistable = {};
    for (const k of ['voice','captions','ambient','dark']) if (patch[k] !== undefined) persistable[k] = patch[k];
    if (Object.keys(persistable).length) setTweak(persistable);
  };

  const onCallNav = (id) => {
    if (id === 'toggle-cc') { setTweak({ captions: !values.captions }); return; }
    setScreen(id);
  };

  let content;
  switch (screen) {
    case 'splash': content = <S.SplashScreen/>; break;
    case 'welcome': content = <S.WelcomeScreen onStart={() => setScreen('onboarding')}/>; break;
    case 'onboarding': content = <S.OnboardingScreen onComplete={() => setScreen('call')}/>; break;
    case 'call': content = <S.CallScreen dark={values.dark} captions={values.captions} ambient={values.ambient !== 'Off' ? values.ambient.toLowerCase() : null} onNav={onCallNav}/>; break;
    case 'memory': content = <S.MemoryScreen onBack={() => setScreen('call')}/>; break;
    case 'practice': content = <S.PracticeScreen onBack={() => setScreen('call')} onStartScenario={() => setScreen('call')}/>; break;
    case 'progress': content = <S.ProgressScreen onBack={() => setScreen('call')}/>; break;
    case 'settings': content = <S.SettingsScreen onBack={() => setScreen('call')} settings={settings} onChange={onChange}/>; break;
    default: content = <S.WelcomeScreen onStart={() => setScreen('onboarding')}/>;
  }

  return (
    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 32, flexWrap: 'wrap' }}>
      <div data-screen-label={`PeerUp · ${screen}`}>
        <IOSDevice dark={screen === 'splash' || screen === 'onboarding' || screen === 'call' ? true : values.dark}>
          {content}
        </IOSDevice>
      </div>

      <TweaksPanel title="Tweaks" defaultPosition={{ right: 24, top: 24 }}>
        <TweakSection title="Quick jump">
          <TweakSelect label="Screen" value={values.startScreen}
            options={['splash','welcome','onboarding','call','memory','practice','progress','settings']}
            onChange={(v) => setTweak({ startScreen: v })}/>
        </TweakSection>
        <TweakSection title="Call screen">
          <TweakToggle label="Captions" value={values.captions} onChange={(v) => setTweak({ captions: v })}/>
          <TweakToggle label="Dark / Dusk mode" value={values.dark} onChange={(v) => setTweak({ dark: v })}/>
          <TweakRadio label="Ambient" value={values.ambient} options={['Off','Café','Evening']} onChange={(v) => setTweak({ ambient: v })}/>
        </TweakSection>
        <TweakSection title="Maya's voice">
          <TweakRadio label="Variant" value={values.voice} options={['Indian English','British','American']} onChange={(v) => setTweak({ voice: v })}/>
        </TweakSection>
        <TweakSection title="How to drive">
          <div style={{ fontFamily: 'Fraunces, serif', fontStyle: 'italic', fontSize: 13, color: '#666', lineHeight: 1.5 }}>
            On the call screen — long-press anywhere to "hold the floor". Long-press the end button (1s) to hang up. Tap ⋯ for the four secondary screens.
          </div>
        </TweakSection>
      </TweaksPanel>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
